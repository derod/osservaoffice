{% extends "base.html" %}{% set active_nav="schedule_requests" %}
{% block title %}New Schedule Request — OSSERVA OFFICE{% endblock %}
{% block content %}
<div class="max-w-xl">
  <div class="mb-5"><a href="{{ url_for('schedule_requests.list_requests') }}" class="text-sm text-[hsl(var(--muted-foreground))] hover:text-[hsl(var(--foreground))]">← Requests</a></div>
  <div class="dk-card rounded-xl border border-[hsl(var(--border))] shadow-sm p-6">
    <h1 class="text-xl font-bold mb-6">New Schedule Request</h1>
    <form method="POST" action="{{ url_for('schedule_requests.new_request') }}" class="space-y-4">
      {% if current_user.role != 'staff' %}
      <div><label class="block text-xs font-medium text-[hsl(var(--muted-foreground))] mb-1">For Employee *</label>
        <select name="requested_employee_id" required class="w-full dk-input rounded-lg px-3 py-2 text-sm focus:outline-none">
          {% for u in all_users %}<option value="{{ u.id }}" {% if selected_employee_id==u.id %}selected{% endif %}>{{ u.full_name }}</option>{% endfor %}
        </select></div>
      {% endif %}
      <div><label class="block text-xs font-medium text-[hsl(var(--muted-foreground))] mb-1">Request Type *</label>
        <select name="request_type" required class="w-full dk-input rounded-lg px-3 py-2 text-sm focus:outline-none">
          <option value="new_meeting">New Meeting</option><option value="reschedule">Reschedule</option><option value="block_time">Block Time</option><option value="time_off">Time Off</option>
        </select></div>
      <div class="grid grid-cols-2 gap-4">
        <div><label class="block text-xs font-medium text-[hsl(var(--muted-foreground))] mb-1">Start Date *</label>
          <input type="date" name="start_date" required class="w-full dk-input rounded-lg px-3 py-2 text-sm focus:outline-none"></div>
        <div><label class="block text-xs font-medium text-[hsl(var(--muted-foreground))] mb-1">Start Time *</label>
          <input type="time" name="start_time" required class="w-full dk-input rounded-lg px-3 py-2 text-sm focus:outline-none" value="09:00"></div>
        <div><label class="block text-xs font-medium text-[hsl(var(--muted-foreground))] mb-1">End Date *</label>
          <input type="date" name="end_date" required class="w-full dk-input rounded-lg px-3 py-2 text-sm focus:outline-none"></div>
        <div><label class="block text-xs font-medium text-[hsl(var(--muted-foreground))] mb-1">End Time *</label>
          <input type="time" name="end_time" required class="w-full dk-input rounded-lg px-3 py-2 text-sm focus:outline-none" value="17:00"></div>
      </div>
      <div><label class="block text-xs font-medium text-[hsl(var(--muted-foreground))] mb-1">Reason</label>
        <textarea name="reason" rows="3" class="w-full dk-input rounded-lg px-3 py-2 text-sm focus:outline-none"></textarea></div>
      <div class="flex justify-end gap-3 pt-2">
        <a href="{{ url_for('schedule_requests.list_requests') }}" class="inline-flex items-center gap-2 dk-card dk-card-hover text-[hsl(var(--card-foreground))] text-sm font-medium px-4 py-2 rounded-lg border border-[hsl(var(--border))]">Cancel</a>
        <button type="submit" class="inline-flex items-center gap-2 bg-slate-800 hover:bg-slate-700 text-white text-sm font-medium px-4 py-2 rounded-lg">Submit Request</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
