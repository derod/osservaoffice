{% extends "base.html" %}{% set active_nav="clients" %}
{% block title %}New Client — OSSERVA OFFICE{% endblock %}
{% block content %}
<div class="w-full max-w-xl">
  <div class="mb-4"><a href="{{ url_for('clients.list_clients') }}" class="text-sm hover:opacity-80" style="color:hsl(var(--muted-foreground))">← Clients</a></div>
  <div class="dk-card rounded-xl border border-[hsl(var(--border))] shadow-sm p-4 sm:p-6">
    <h1 class="text-xl font-bold mb-5" style="color:hsl(var(--foreground))">New Client</h1>
    <form method="POST" action="{{ url_for('clients.new_client') }}" class="space-y-4">
      <div><label class="block text-xs font-medium mb-1" style="color:hsl(var(--muted-foreground))">Full Name *</label>
        <input name="full_name" required class="w-full dk-input rounded-lg px-3 py-2.5 text-sm focus:outline-none"></div>
      <div><label class="block text-xs font-medium mb-1" style="color:hsl(var(--muted-foreground))">Company Name</label>
        <input name="company_name" class="w-full dk-input rounded-lg px-3 py-2.5 text-sm focus:outline-none"></div>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 sm:gap-4">
        <div><label class="block text-xs font-medium mb-1" style="color:hsl(var(--muted-foreground))">Email</label>
          <input type="email" name="email" class="w-full dk-input rounded-lg px-3 py-2.5 text-sm focus:outline-none"></div>
        <div><label class="block text-xs font-medium mb-1" style="color:hsl(var(--muted-foreground))">Phone</label>
          <input name="phone" class="w-full dk-input rounded-lg px-3 py-2.5 text-sm focus:outline-none"></div>
      </div>
      <div><label class="block text-xs font-medium mb-1" style="color:hsl(var(--muted-foreground))">Address</label>
        <input name="address" class="w-full dk-input rounded-lg px-3 py-2.5 text-sm focus:outline-none"></div>
      <div><label class="block text-xs font-medium mb-1" style="color:hsl(var(--muted-foreground))">Notes</label>
        <textarea name="notes" rows="3" class="w-full dk-input rounded-lg px-3 py-2.5 text-sm focus:outline-none"></textarea></div>
      <div class="flex flex-col-reverse sm:flex-row sm:justify-end gap-3 pt-2">
        <a href="{{ url_for('clients.list_clients') }}" class="inline-flex items-center justify-center gap-2 dk-card dk-card-hover text-sm font-medium px-4 py-2.5 rounded-lg border border-[hsl(var(--border))]" style="color:hsl(var(--card-foreground))">Cancel</a>
        <button type="submit" class="inline-flex items-center justify-center gap-2 bg-slate-800 hover:bg-slate-700 text-white text-sm font-medium px-4 py-2.5 rounded-lg">Create Client</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
